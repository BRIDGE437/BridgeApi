services:
  redis:
    image: redis:7-alpine
    container_name: bridge-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    container_name: bridge-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped

  seq:
    image: datalust/seq:2024.3
    container_name: bridge-seq
    ports:
      - "5341:5341"
      - "8081:80"
    environment:
      - ACCEPT_EULA=Y
    volumes:
      - seq-data:/data
    restart: unless-stopped

volumes:
  redis-data:
  seq-data:
